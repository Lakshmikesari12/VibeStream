<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeStream | Fully Functional Music Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .bg-gradient-dark { background: radial-gradient(circle at top right, #1e1b4b, #000000); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-bg { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); }
        .active-song { border: 2px solid #a855f7; background: rgba(168, 85, 247, 0.1); }
        
        /* Mobile Specific Adjustments */
        @media (max-width: 768px) {
            .mobile-hide { display: none; }
            .mobile-p-4 { padding: 5rem;padding-top: 7px; }
            .mobile-bottom-bar { height: auto; padding-bottom: 10rem; }
        }
    </style>
</head>
<body class="bg-gradient-dark text-white min-h-screen font-sans overflow-hidden">

    <audio id="main-audio" src=""></audio>

    <div id="auth-container" class="flex items-center justify-center min-h-screen p-4 md:p-6">
        <div class="glass w-full max-w-md p-6 md:p-8 rounded-2xl shadow-2xl">
            <div id="login-view">
                <div class="flex flex-col items-center mb-6">
                    <i class="fa-solid fa-headset text-purple-500 text-5xl mb-2"></i>
                    <h2 class="text-3xl font-bold">VibeStream</h2>
                </div>
                <input type="text" id="login-user" placeholder="Username" class="w-full bg-white/10 p-3 rounded-lg mb-4 outline-none border border-transparent focus:border-purple-500 transition">
                <input type="password" id="login-pass" placeholder="Password" class="w-full bg-white/10 p-3 rounded-lg mb-6 outline-none border border-transparent focus:border-purple-500 transition">
                <button onclick="handleLogin()" class="w-full bg-purple-600 hover:bg-purple-700 p-3 rounded-lg font-bold transition">Sign In</button>
                <p class="mt-6 text-center text-sm text-gray-400">Don't have an account? <a href="#" onclick="toggleAuth()" class="text-purple-400 font-bold">Register here</a></p>
            </div>

            <div id="register-view" class="hidden">
                <h2 class="text-2xl font-bold mb-6 text-center">Join the VibeStream</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                    <input type="text" id="reg-user" placeholder="Username" class="bg-white/10 p-3 rounded-lg outline-none border border-transparent focus:border-purple-500 transition">
                    <input type="email" id="reg-email" placeholder="Email" class="bg-white/10 p-3 rounded-lg outline-none border border-transparent focus:border-purple-500 transition">
                </div>
                <input type="number" id="reg-mobile" placeholder="Mobile" class="w-full bg-white/10 p-3 rounded-lg mb-4 outline-none border border-transparent focus:border-purple-500 transition">
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <input type="number" id="reg-age" placeholder="Age" class="bg-white/10 p-3 rounded-lg outline-none border border-transparent focus:border-purple-500 transition">
                    <select id="reg-gender" class="bg-white/10 p-3 rounded-lg outline-none text-gray-400">
                        <option value="">Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>
                <input type="password" id="reg-pass" placeholder="Password" class="w-full bg-white/10 p-3 rounded-lg mb-6 outline-none border border-transparent focus:border-purple-500 transition">
                <button onclick="handleRegister()" class="w-full bg-purple-600 hover:bg-purple-700 p-3 rounded-lg font-bold transition">Create Account</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden flex flex-col h-screen">
        <header class="glass flex items-center justify-between px-4 md:px-8 py-4 z-40">
            <div class="flex items-center gap-2 md:gap-4">
                <div class="bg-purple-600 p-2 rounded-lg shadow-lg">
                    <i class="fa-solid fa-headset text-white text-xl md:text-2xl"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] md:text-xs text-gray-400 uppercase tracking-widest font-bold">Welcome to VibeStream,</span>
                    <h1 class="text-sm md:text-lg font-bold truncate max-w-[100px] md:max-w-full"><span id="display-name" class="text-purple-400">User</span></h1>
                </div>
            </div>

            <div class="flex-1 max-w-xs md:max-w-md mx-4 md:mx-8">
                <div class="relative">
                    <i class="fa fa-search absolute left-3 top-2.5 text-gray-400 text-sm md:text-base"></i>
                    <input type="text" onkeyup="filterSongs(this.value)" placeholder="Search songs..." class="w-full bg-white/10 py-2 pl-10 pr-4 rounded-full text-sm outline-none focus:bg-white/20 transition">
                </div>
            </div>

            <div class="flex items-center gap-3 md:gap-5">
                <i class="fa fa-gear text-lg md:text-xl cursor-pointer hover:rotate-90 transition" onclick="openModal('settings-modal')"></i>
                <div class="w-8 h-8 md:w-10 md:h-10 rounded-full border-2 border-purple-500 cursor-pointer overflow-hidden shadow-lg" onclick="openModal('profile-modal')">
                    <img id="header-avatar" src="" class="w-full h-full object-cover">
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-8 pb-40 no-scrollbar">
            <div id="view-title" class="flex justify-between items-center mb-6 md:mb-8">
                <h2 class="text-xl md:text-3xl font-black italic uppercase tracking-tighter">Music Library</h2>
                <button onclick="renderSongs(songs, 'Music Library')" class="text-[10px] md:text-xs text-purple-400 hover:underline">Show All</button>
            </div>
            <div id="song-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6"></div>
        </main>

        <footer class="fixed bottom-0 w-full glass p-3 md:p-4 flex flex-col md:flex-row items-center justify-between px-4 md:px-10 border-t border-white/10">
            <div class="flex items-center gap-3 md:gap-4 w-full md:w-1/4 mb-3 md:mb-0">
                <img id="p-img" src="https://via.placeholder.com/50" class="w-10 h-10 md:w-12 md:h-12 rounded shadow-lg flex-shrink-0">
                <div class="overflow-hidden">
                    <h4 id="p-title" class="font-bold text-xs md:text-sm truncate">Select a Song</h4>
                    <p id="p-artist" class="text-[10px] md:text-xs text-gray-400 truncate">--</p>
                </div>
                <div class="flex gap-3 ml-auto md:ml-2">
                    <i id="fav-btn" onclick="toggleFavoriteCurrent()" class="fa-regular fa-heart cursor-pointer hover:text-red-500 transition text-sm"></i>
                    <i id="list-btn" onclick="togglePlaylistCurrent()" class="fa-solid fa-plus-square cursor-pointer hover:text-blue-400 transition text-sm"></i>
                </div>
            </div>

            <div class="flex flex-col items-center gap-1 md:gap-2 w-full md:w-2/4">
                <div class="flex items-center gap-6 md:gap-8 text-lg md:text-xl">
                    <i class="fa fa-step-backward cursor-pointer hover:text-purple-400" onclick="prevSong()"></i>
                    <button onclick="togglePlay()" id="play-btn-footer" class="w-10 h-10 md:w-12 md:h-12 bg-white text-black rounded-full flex items-center justify-center hover:scale-110 transition shadow-lg">
                        <i class="fa fa-play ml-1"></i>
                    </button>
                    <i class="fa fa-step-forward cursor-pointer hover:text-purple-400" onclick="nextSong()"></i>
                </div>
                <div class="w-full flex items-center gap-3">
                    <span id="curr-time" class="text-[9px] md:text-[10px] text-gray-400 w-8 text-right">0:00</span>
                    <input type="range" id="progress-bar" value="0" class="flex-1 accent-purple-500 h-1 cursor-pointer">
                    <span id="total-time" class="text-[9px] md:text-[10px] text-gray-400 w-8">0:00</span>
                </div>
            </div>

            <div class="mobile-hide w-1/4 flex justify-end gap-3 items-center">
                <i class="fa fa-volume-up text-xs text-gray-400"></i>
                <input type="range" id="volume-control" class="w-20 accent-white h-1">
            </div>
        </footer>
    </div>

    <div id="profile-modal" class="hidden fixed inset-0 modal-bg z-50 flex items-center justify-center p-4">
        <div class="glass w-full max-w-md p-6 md:p-8 rounded-3xl relative">
            <button onclick="closeModal('profile-modal')" class="absolute top-4 right-4 text-gray-400 hover:text-white"><i class="fa fa-times text-xl"></i></button>
            <h2 class="text-xl md:text-2xl font-bold mb-6 text-purple-400">My Profile</h2>
            <div class="flex flex-col items-center mb-6 group relative">
                <img id="edit-avatar" src="" class="w-20 h-20 md:w-24 md:h-24 rounded-full border-4 border-purple-500 object-cover mb-4">
                <label class="absolute bottom-4 bg-purple-600 p-2 rounded-full cursor-pointer opacity-100 md:opacity-0 md:group-hover:opacity-100 transition">
                    <i class="fa fa-camera text-xs"></i>
                    <input type="file" id="avatar-input" class="hidden" onchange="previewImage(this)">
                </label>
            </div>
            <div class="space-y-4">
                <input id="edit-user" type="text" placeholder="Username" class="w-full bg-white/5 p-3 rounded-lg border border-white/10 outline-none focus:border-purple-500 text-sm">
                <input id="edit-email" type="email" placeholder="Email" class="w-full bg-white/5 p-3 rounded-lg border border-white/10 outline-none focus:border-purple-500 text-sm">
                <div class="grid grid-cols-2 gap-4">
                    <input id="edit-mobile" type="text" placeholder="Mobile" class="w-full bg-white/5 p-3 rounded-lg border border-white/10 outline-none focus:border-purple-500 text-sm">
                    <input id="edit-age" type="number" placeholder="Age" class="w-full bg-white/5 p-3 rounded-lg border border-white/10 outline-none focus:border-purple-500 text-sm">
                </div>
                <button onclick="saveProfile()" class="w-full bg-purple-600 p-3 rounded-xl font-bold mt-4 hover:bg-purple-700 transition">Update Details</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="hidden fixed inset-0 modal-bg z-50 flex items-center justify-center p-4">
        <div class="glass w-full max-w-sm p-5 md:p-6 rounded-3xl relative">
            <button onclick="closeModal('settings-modal')" class="absolute top-4 right-4 text-gray-400 hover:text-white"><i class="fa fa-times text-xl"></i></button>
            <h2 class="text-xl md:text-2xl font-bold mb-6"><i class="fa fa-sliders mr-2 text-purple-500"></i>Settings</h2>
            <div class="space-y-2">
                <button onclick="showFavorites()" class="w-full text-left p-3 md:p-4 hover:bg-white/10 rounded-xl transition flex justify-between items-center group">
                    <span class="text-sm md:text-base"><i class="fa fa-heart mr-3 text-red-500"></i> My Favorites</span>
                    <i class="fa fa-chevron-right text-[10px] group-hover:translate-x-1 transition"></i>
                </button>
                <button onclick="showPlaylist()" class="w-full text-left p-3 md:p-4 hover:bg-white/10 rounded-xl transition flex justify-between items-center group">
                    <span class="text-sm md:text-base"><i class="fa fa-list mr-3 text-blue-500"></i> My Playlist</span>
                    <i class="fa fa-chevron-right text-[10px] group-hover:translate-x-1 transition"></i>
                </button>
                <button onclick="handleLogout()" class="w-full text-left p-3 md:p-4 hover:bg-red-500/20 text-red-400 rounded-xl transition font-bold mt-2">
                    <i class="fa fa-sign-out mr-3"></i> Logout Account
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
